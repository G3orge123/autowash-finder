version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.3
    container_name: washify-db
    environment:
      POSTGRES_DB: washify_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_tau
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: